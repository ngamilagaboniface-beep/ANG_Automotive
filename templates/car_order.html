<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>{{ product.name }} | ANG Automotive</title>
</head>
<body class="bg-gray-50">
    <nav class="bg-slate-900 text-white p-4">
        <div class="max-w-6xl mx-auto"><a href="/" class="font-bold text-orange-500">← Back to Catalog</a></div>
    </nav>

    <main class="max-w-6xl mx-auto py-10 px-4">
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden flex flex-col md:flex-row">
            <div class="md:w-1/2 bg-gray-200">
                <img src="{{ url_for('static', filename='uploads/' + product.image_file) }}" 
                     class="w-full h-full object-cover">
            </div>

            <div class="md:w-1/2 p-10">
                <span class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full text-xs font-bold uppercase">
                    {{ product.type }}
                </span>
                <h1 class="text-4xl font-black text-slate-900 mt-4 mb-2">{{ product.name }}</h1>
                <p class="text-3xl font-bold text-orange-600 mb-6">{{ "{:,}".format(product.price) }} TZS</p>
                
                <div class="bg-gray-50 p-6 rounded-2xl mb-8">
                    <h3 class="font-bold text-gray-700 mb-2">Specifications / Description</h3>
                    <p class="text-gray-600 leading-relaxed">{{ product.description }}</p>
                </div>

                <div class="border-2 border-orange-500 p-6 rounded-2xl">
                    <h3 class="font-bold text-slate-900 mb-4 text-center">Ready to Purchase?</h3>
                    <form action="/order/{{ product.id }}" method="POST" class="space-y-4">
                        <input type="text" name="name" placeholder="Full Name" required 
                               class="w-full border p-3 rounded-xl focus:ring-2 ring-orange-500 outline-none">
                        <input type="tel" name="phone" placeholder="Phone Number (e.g. 07...)" required 
                               class="w-full border p-3 rounded-xl focus:ring-2 ring-orange-500 outline-none">
                        <button type="submit" 
                                class="w-full bg-orange-500 text-white py-4 rounded-xl font-black text-lg hover:bg-orange-600 transition uppercase shadow-lg">
                            Confirm Order
                        </button>
                    </form>
                    <p class="text-[10px] text-center text-gray-400 mt-4 italic">
                        By clicking, ANG Automotive will contact you to finalize shipping and payment.
                    </p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
