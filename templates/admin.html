<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | ANG Automotive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; font-family: 'Inter', sans-serif; }
        .card { background: #141414; border: 1px solid #262626; }
    </style>
</head>
<body class="text-gray-200">

    <nav class="border-b border-zinc-800 bg-black/50 backdrop-blur-md sticky top-0 z-50">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-black italic tracking-tighter text-orange-500">ANG <span class="text-white">ADMIN</span></h1>
            <div class="flex items-center gap-6">
                <a href="/" class="text-xs uppercase tracking-widest hover:text-orange-500 transition">View Site</a>
                <a href="/logout" class="bg-zinc-800 hover:bg-red-600 text-white text-[10px] uppercase font-bold px-4 py-2 rounded-lg transition">Logout</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-10">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
            
            <div class="lg:col-span-1">
                <div class="card p-8 rounded-2xl shadow-2xl">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <span class="w-2 h-6 bg-orange-500 rounded-full"></span>
                        Inventory Entry
                    </h2>
                    
                    <form action="/add_car" method="POST" class="space-y-5">
                        <div>
                            <label class="block text-[10px] uppercase text-gray-500 font-bold mb-2">Car Model</label>
                            <input type="text" name="model" placeholder="e.g. BMW M4 Competition" required
                                class="w-full bg-black border border-zinc-800 rounded-xl p-4 focus:border-orange-500 outline-none text-sm">
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase text-gray-500 font-bold mb-2">Price (TZS/USD)</label>
                            <input type="text" name="price" placeholder="e.g. $85,000" required
                                class="w-full bg-black border border-zinc-800 rounded-xl p-4 focus:border-orange-500 outline-none text-sm">
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase text-gray-500 font-bold mb-2">Image URL</label>
                            <input type="text" name="image_url" placeholder="Link to car photo"
                                class="w-full bg-black border border-zinc-800 rounded-xl p-4 focus:border-orange-500 outline-none text-sm">
                        </div>
                        <div>
                            <label class="block text-[10px] uppercase text-gray-500 font-bold mb-2">Description</label>
                            <textarea name="description" rows="4" placeholder="Features, specs, condition..."
                                class="w-full bg-black border border-zinc-800 rounded-xl p-4 focus:border-orange-500 outline-none text-sm"></textarea>
                        </div>
                        <button type="submit" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-black py-4 rounded-xl uppercase tracking-widest text-xs transition-all shadow-lg shadow-orange-900/20">
                            Add to Showroom
                        </button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
