<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>ANG Login</title>
</head>
<body class="bg-slate-900 h-screen flex items-center justify-center">
    <div class="bg-white p-10 rounded-3xl shadow-2xl w-96 text-center">
        <h1 class="text-3xl font-black italic text-slate-800 mb-2">ANG</h1>
        <p class="text-orange-500 font-bold text-xs uppercase mb-8">Admin Access</p>
        <form action="/login" method="POST" class="space-y-4">
            <input type="password" name="password" placeholder="Password" class="w-full border p-3 rounded-xl focus:ring-2 ring-orange-500 outline-none">
            <button class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold hover:bg-orange-500 transition">Enter</button>
        </form>
    </div>
</body>
</html>
