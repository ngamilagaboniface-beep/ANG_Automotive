<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>ANG Automotive | Cars & Parts</title>
</head>
<body class="bg-gray-50">
    <nav class="bg-slate-900 text-white p-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center px-4">
            <h1 class="text-2xl font-black text-orange-500 italic">ANG AUTOMOTIVE</h1>
            <form action="/" class="flex-1 max-w-lg mx-6 flex">
                <input type="text" name="q" placeholder="Search..." class="w-full p-2 rounded-l text-black outline-none">
                <button class="bg-orange-500 px-4 rounded-r font-bold hover:bg-orange-600 transition">Search</button>
            </form>
            <div class="space-x-4 text-sm font-bold">
                <a href="/?type=Car" class="hover:text-orange-400">CARS</a>
                <a href="/?type=Part" class="hover:text-orange-400">PARTS</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto flex p-6 gap-6">
        <aside class="w-64 bg-white p-6 shadow rounded-xl h-fit">
            <h3 class="font-bold border-b pb-2 mb-4">Shop Filters</h3>
            <form action="/" method="GET" class="space-y-4">
                <input type="number" name="price_max" placeholder="Max Price (TZS)" class="w-full border p-2 rounded text-sm">
                <select name="cat" class="w-full border p-2 rounded text-sm">
                    <option value="">Categories</option>
                    <option value="Engine">Engine</option>
                    <option value="SUV">SUV</option>
                    <option value="Sedan">Sedan</option>
                </select>
                <button type="submit" class="w-full bg-slate-800 text-white py-2 rounded font-bold">Filter</button>
            </form>
        </aside>

        <main class="flex-1 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            {% for item in products %}
            <div class="bg-white rounded-2xl shadow-sm border p-4 hover:shadow-lg transition group">
                <div class="h-44 overflow-hidden rounded-xl mb-4">
                    <img src="{{ url_for('static', filename='uploads/' + item.image_file) }}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                </div>
                <span class="text-[10px] bg-orange-100 text-orange-600 px-2 py-1 rounded font-bold uppercase">{{ item.type }}</span>
                <h2 class="font-bold text-lg mt-2 leading-tight h-12">{{ item.name }}</h2>
                <p class="text-orange-600 font-black text-xl mb-4">{{ "{:,}".format(item.price) }} TZS</p>
                
                <form action="/order/{{ item.id }}" method="POST" class="space-y-2 pt-4 border-t">
                    <input type="text" name="name" placeholder="Your Name" required class="w-full border p-2 text-xs rounded-lg">
                    <input type="tel" name="phone" placeholder="Phone Number" required class="w-full border p-2 text-xs rounded-lg">
                    <button class="w-full bg-slate-900 text-white py-2 rounded-lg text-sm font-bold hover:bg-orange-600 transition">Place Order</button>
                </form>
            </div>
            {% endfor %}
        </main>
    </div>
</body>
</html>
