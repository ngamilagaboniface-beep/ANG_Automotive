<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANG Automotive | Pure Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Splash Screen styling */
        #splash-screen {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease-in-out;
        }
        .loading-bar {
            width: 200px;
            height: 2px;
            background: #333;
            margin-top: 20px;
            overflow: hidden;
            position: relative;
        }
        .loading-progress {
            width: 0%;
            height: 100%;
            background: #f97316; /* Orange-500 */
            animation: load 2.5s forwards;
        }
        @keyframes load {
            to { width: 100%; }
        }
    </style>
</head>
<body class="bg-black text-white">

    <div id="splash-screen">
        <h1 class="text-6xl font-black italic tracking-tighter text-orange-500">ANG</h1>
        <p class="text-gray-400 tracking-[0.5em] uppercase text-xs mt-2">Automotive</p>
        <div class="loading-bar">
            <div class="loading-progress"></div>
        </div>
        <p class="text-[10px] text-gray-600 mt-4 uppercase">Unleashing Adrenaline...</p>
    </div>

    <div class="container mx-auto px-4 py-10">
        <header class="flex justify-between items-center mb-12">
            <h2 class="text-2xl font-bold tracking-tighter">ANG <span class="text-orange-500">SHOWROOM</span></h2>
            <a href="/login" class="text-xs text-gray-500 hover:text-white">Admin Access</a>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            {% for car in cars %}
            <div class="bg-zinc-900 rounded-xl overflow-hidden border border-zinc-800">
                <img src="{{ car.image_url or 'https://via.placeholder.com/600x400?text=ANG+Automotive' }}" class="w-full h-48 object-cover">
                <div class="p-6">
                    <h3 class="text-xl font-bold">{{ car.model }}</h3>
                    <p class="text-orange-500 font-bold mt-1">{{ car.price }}</p>
                    <p class="text-gray-400 text-sm mt-3">{{ car.description }}</p>
                    <button class="w-full mt-6 bg-white text-black font-bold py-2 rounded-lg hover:bg-orange-500 transition-colors">Inquire via WhatsApp</button>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        // Splash screen logic
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                }, 800);
            }, 3000); // 3 seconds delay
        });
    </script>
</body>
</html>
