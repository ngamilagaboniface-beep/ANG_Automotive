<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='logo512.png') }}">
    
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    
    <meta name="theme-color" content="#f97316"> </head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANG Performance | Showroom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active { color: #f97316; border-bottom: 3px solid #f97316; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-black text-white">

    <header class="py-10 border-b border-zinc-900 text-center">
        <h1 class="text-6xl font-black italic text-orange-500">ANG</h1>
        <div class="flex justify-center gap-8 mt-6 uppercase text-xs font-bold tracking-widest">
            <button onclick="switchTab('cars')" id="btn-cars" class="tab-active pb-2">Vehicles</button>
            <button onclick="switchTab('parts')" id="btn-parts" class="pb-2">Spare Parts</button>
        </div>
    </header>

    <main class="container mx-auto px-6 py-12">
        <div id="view-cars" class="grid grid-cols-1 md:grid-cols-2 gap-10">
            {% for car in cars %}
            <div class="bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800">
                <img src="{{ car.image_url }}" class="w-full h-72 object-cover">
                <div class="p-8">
                    <h3 class="text-3xl font-bold">{{ car.model }}</h3>
                    <p class="text-orange-500 text-2xl font-black">{{ "{:,.0f}".format(car.price) }} TZS</p>
                    <p class="text-zinc-500 text-sm mt-4">{{ car.specs }}</p>
                    <form action="/checkout/car/{{ car.id }}" method="POST" class="mt-6 space-y-3">
                        <input type="text" name="customer_name" placeholder="Full Name" required class="w-full bg-black border border-zinc-700 p-3 rounded-xl">
                        <input type="text" name="customer_phone" placeholder="Phone" required class="w-full bg-black border border-zinc-700 p-3 rounded-xl">
                        <button class="w-full bg-white text-black font-bold py-3 rounded-xl uppercase">Order Vehicle</button>
                    </form>
                </div>
            </div>
            {% endfor %}
        </div>

        <div id="view-parts" class="hidden grid grid-cols-2 md:grid-cols-4 gap-6">
            {% for part in parts %}
            <div class="bg-zinc-900 p-5 rounded-2xl border border-zinc-800">
                <img src="{{ part.image_url }}" class="w-full h-40 object-cover rounded-xl mb-4">
                <span class="text-[10px] text-orange-500 font-bold uppercase">{{ part.category }}</span>
                <h4 class="font-bold text-lg">{{ part.name }}</h4>
                <p class="text-white font-bold">{{ "{:,.0f}".format(part.price) }} TZS</p>
                <form action="/checkout/part/{{ part.id }}" method="POST" class="mt-4">
                    <input type="text" name="customer_name" placeholder="Your Name" required class="w-full bg-black border border-zinc-700 p-2 rounded-lg text-xs mb-2">
                    <button class="w-full bg-orange-600 py-2 rounded-lg text-xs font-bold">BUY NOW</button>
                </form>
            </div>
            {% endfor %}
        </div>
    </main>

    <script>
        function switchTab(type) {
            document.getElementById('view-cars').classList.toggle('hidden', type !== 'cars');
            document.getElementById('view-parts').classList.toggle('hidden', type !== 'parts');
            document.getElementById('btn-cars').className = type === 'cars' ? 'tab-active pb-2' : 'pb-2';
            document.getElementById('btn-parts').className = type === 'parts' ? 'tab-active pb-2' : 'pb-2';
        }
    </script>
</body>
</html>
